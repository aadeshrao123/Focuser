name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-arm
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Build sidecar binaries (service, CLI, native host)
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p focuser-service -p focuser-cli -p focuser-native
          mkdir -p crates/focuser-ui/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/focuser-service.exe" "crates/focuser-ui/binaries/focuser-service-${{ matrix.target }}.exe"
            cp "target/${{ matrix.target }}/release/focuser-cli.exe" "crates/focuser-ui/binaries/focuser-cli-${{ matrix.target }}.exe"
            cp "target/${{ matrix.target }}/release/focuser-native.exe" "crates/focuser-ui/binaries/focuser-native-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/focuser-service" "crates/focuser-ui/binaries/focuser-service-${{ matrix.target }}"
            cp "target/${{ matrix.target }}/release/focuser-cli" "crates/focuser-ui/binaries/focuser-cli-${{ matrix.target }}"
            cp "target/${{ matrix.target }}/release/focuser-native" "crates/focuser-ui/binaries/focuser-native-${{ matrix.target }}"
          fi
          ls -la crates/focuser-ui/binaries/

      - name: Build Tauri installer
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: crates/focuser-ui
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect Windows artifacts
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/focuser-ui.exe dist/Focuser-Portable.exe 2>/dev/null || true
          ls -la dist/

      - name: Collect macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig dist/ 2>/dev/null || true
          ls -la dist/

      - name: Collect Linux artifacts
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/focuser-ui dist/Focuser-Linux-x86_64 2>/dev/null || true
          chmod +x dist/* 2>/dev/null || true
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: focuser-${{ matrix.platform }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          ls -la release/

      - name: Generate updater latest.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="aadeshrao123/Focuser"
          BASE="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"

          # Read signatures
          WIN_SIG=""
          MAC_INTEL_SIG=""
          MAC_ARM_SIG=""
          LINUX_SIG=""

          for f in release/*.nsis.zip.sig; do
            [ -f "$f" ] && WIN_SIG=$(cat "$f")
          done
          for f in release/*x86_64-apple-darwin*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_INTEL_SIG=$(cat "$f")
          done
          for f in release/*aarch64-apple-darwin*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_ARM_SIG=$(cat "$f")
          done
          for f in release/*.AppImage.tar.gz.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f")
          done

          # Build platform entries
          PLATFORMS="{"

          if [ -n "$WIN_SIG" ]; then
            WIN_FILE=$(ls release/*.nsis.zip 2>/dev/null | head -1 | xargs basename)
            PLATFORMS="$PLATFORMS\"windows-x86_64\":{\"signature\":\"$WIN_SIG\",\"url\":\"$BASE/$WIN_FILE\"}"
          fi

          if [ -n "$MAC_INTEL_SIG" ]; then
            MAC_INTEL_FILE=$(ls release/*x86_64-apple-darwin*.app.tar.gz 2>/dev/null | grep -v '.sig' | head -1 | xargs basename)
            [ -n "$(echo $PLATFORMS | grep url)" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"darwin-x86_64\":{\"signature\":\"$MAC_INTEL_SIG\",\"url\":\"$BASE/$MAC_INTEL_FILE\"}"
          fi

          if [ -n "$MAC_ARM_SIG" ]; then
            MAC_ARM_FILE=$(ls release/*aarch64-apple-darwin*.app.tar.gz 2>/dev/null | grep -v '.sig' | head -1 | xargs basename)
            [ -n "$(echo $PLATFORMS | grep url)" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"signature\":\"$MAC_ARM_SIG\",\"url\":\"$BASE/$MAC_ARM_FILE\"}"
          fi

          if [ -n "$LINUX_SIG" ]; then
            LINUX_FILE=$(ls release/*.AppImage.tar.gz 2>/dev/null | grep -v '.sig' | head -1 | xargs basename)
            [ -n "$(echo $PLATFORMS | grep url)" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"linux-x86_64\":{\"signature\":\"$LINUX_SIG\",\"url\":\"$BASE/$LINUX_FILE\"}"
          fi

          PLATFORMS="$PLATFORMS}"

          cat > release/latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "Focuser $GITHUB_REF_NAME",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": $PLATFORMS
          }
          ENDJSON

          # Clean up indentation
          python3 -c "import json,sys; d=json.load(open('release/latest.json')); json.dump(d,open('release/latest.json','w'),indent=2)"
          echo "Generated latest.json:"
          cat release/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Focuser ${{ github.ref_name }}
          body: |
            ## Focuser ${{ github.ref_name }}

            ### Downloads

            | Platform | Installer | Portable |
            |----------|-----------|----------|
            | Windows | `.exe` (NSIS installer) | `Focuser-Portable.exe` |
            | macOS (Intel) | `.dmg` | — |
            | macOS (Apple Silicon) | `.dmg` | — |
            | Linux | `.deb` / `.AppImage` | `Focuser-Linux-x86_64` |

            ### Installation
            - **Windows**: Download the `.exe` installer, run it, and follow the setup wizard. Focuser will be added to Start Menu and auto-start on boot.
            - **macOS**: Download the `.dmg`, open it, drag Focuser to Applications.
            - **Linux**: Use the `.deb` for Debian/Ubuntu (`sudo dpkg -i Focuser_*.deb`) or the `.AppImage` for any distro.

            ### Browser extension
            - **Chrome / Edge / Brave / Opera**: [Chrome Web Store](https://chromewebstore.google.com/detail/jpnhbpbcmagoonmaleppldmcnaibkbmj)
            - **Firefox**: [Firefox Add-ons](https://addons.mozilla.org/en-US/firefox/addon/focuser-website-blocker/)

            See the [README](https://github.com/aadeshrao123/Focuser#readme) for full details.
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
