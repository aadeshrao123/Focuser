name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-arm
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Build bundled binaries (service, CLI, native host)
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p focuser-service -p focuser-cli -p focuser-native
          # Copy to target/release/ where tauri.conf.json expects them
          # Use .exe names on all platforms so tauri.conf.json resources resolve
          mkdir -p target/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/focuser-service.exe target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/focuser-cli.exe target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/focuser-native.exe target/release/ 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/focuser-service target/release/focuser-service.exe 2>/dev/null || true
            cp target/${{ matrix.target }}/release/focuser-cli target/release/focuser-cli.exe 2>/dev/null || true
            cp target/${{ matrix.target }}/release/focuser-native target/release/focuser-native.exe 2>/dev/null || true
          fi

      - name: Build Tauri installer
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: crates/focuser-ui

      - name: Collect Windows artifacts
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/focuser-ui.exe dist/Focuser-Portable.exe 2>/dev/null || true
          ls -la dist/

      - name: Collect macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz dist/ 2>/dev/null || true
          ls -la dist/

      - name: Collect Linux artifacts
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/focuser-ui dist/Focuser-Linux-x86_64 2>/dev/null || true
          chmod +x dist/* 2>/dev/null || true
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: focuser-${{ matrix.platform }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Focuser ${{ github.ref_name }}
          body: |
            ## Focuser ${{ github.ref_name }}

            ### Downloads

            | Platform | Installer | Portable |
            |----------|-----------|----------|
            | Windows | `.exe` (NSIS installer) | `Focuser-Portable.exe` |
            | macOS (Intel) | `.dmg` | — |
            | macOS (Apple Silicon) | `.dmg` | — |
            | Linux | `.deb` / `.AppImage` | `Focuser-Linux-x86_64` |

            ### Installation
            - **Windows**: Download the `.exe` installer, run it, and follow the setup wizard. Focuser will be added to Start Menu and auto-start on boot.
            - **macOS**: Download the `.dmg`, open it, drag Focuser to Applications.
            - **Linux**: Use the `.deb` for Debian/Ubuntu (`sudo dpkg -i Focuser_*.deb`) or the `.AppImage` for any distro.

            ### What's included
            - Desktop app with embedded blocking engine
            - Auto-starts on system boot
            - Website blocking (hosts file + browser extension)
            - Application blocking (process termination)
            - Pre-made block lists (1,089 domains, 13 categories)
            - Bulk import from text/JSON files
            - Exceptions (whitelist) support

            ### Browser extension
            Load the `extension/` folder as an unpacked extension in Chrome, Firefox, or Edge for custom block pages and instant URL blocking.

            See the [README](https://github.com/aadeshrao123/Focuser#readme) for full setup.
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
