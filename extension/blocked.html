<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocked — Focuser</title>
<link rel="stylesheet" href="blocked.css">
</head>
<body>
<div class="container">
  <div class="shield">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>
  <h1>This website is blocked.</h1>
  <p class="quote" id="quote"></p>
  <div class="actions">
    <button class="btn-back" id="btn-back">Go Back</button>
  </div>
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
    Protected by Focuser
  </div>
</div>

<script>
  // Extract domain from all possible sources
  var params = new URLSearchParams(window.location.search);
  var domain = params.get('domain') || '';
  if (!domain) {
    try { domain = new URLSearchParams(window.location.hash.substring(1)).get('domain') || ''; } catch(e) {}
  }
  if (!domain) domain = 'this site';

  // Set tab title like Cold Turkey
  document.title = 'Blocked by Focuser';

  // Motivational quotes
  var quotes = [
    "The secret of getting ahead is getting started. —Mark Twain",
    "Focus on being productive instead of busy. —Tim Ferriss",
    "You can't use up creativity. The more you use, the more you have. —Maya Angelou",
    "It's not that I'm so smart, it's just that I stay with problems longer. —Albert Einstein",
    "The best time to plant a tree was 20 years ago. The second best time is now. —Chinese Proverb",
    "Do the hard jobs first. The easy jobs will take care of themselves. —Dale Carnegie",
    "Discipline is choosing between what you want now and what you want most. —Abraham Lincoln",
    "Your future is created by what you do today, not tomorrow. —Robert Kiyosaki",
  ];
  document.getElementById('quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

  document.getElementById('btn-back').addEventListener('click', function() {
    window.location.href = 'about:home';
  });
</script>
</body>
</html>
